<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.:Comparador de Algoritmos/ Despliegue de 3 modelos:.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
            padding: 30px 20px 60px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .back-btn {
            color: #94a3b8;
            text-decoration: none;
            font-size: .85rem;
            margin-bottom: 20px;
            display: inline-block;
        }

        .back-btn:hover {
            color: #f1f5f9;
        }

        .hero {
            text-align: center;
            margin-bottom: 30px;
        }

        .hero h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .hero p {
            color: #94a3b8;
            font-size: .95rem;
        }

        .badge-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }

        .badge {
            font-size: .7rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 12px;
            text-transform: uppercase;
        }

        .badge-h {
            background: rgba(167, 139, 250, .15);
            color: #a78bfa;
        }

        .badge-i {
            background: rgba(52, 211, 153, .15);
            color: #34d399;
        }

        .badge-rc {
            background: rgba(244, 114, 182, .15);
            color: #f472b6;
        }

        /* Input Panel */
        .input-panel {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 28px;
        }

        .input-panel h2 {
            font-size: .8rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
        }

        .puzzle-inputs {
            display: flex;
            gap: 20px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            min-width: 180px;
        }

        .input-group label {
            display: block;
            font-size: .8rem;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .slots {
            display: flex;
            gap: 6px;
        }

        .slots input {
            width: 50px;
            height: 50px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            background: rgba(15, 23, 42, .6);
            color: #f1f5f9;
            font-size: 1.2rem;
            font-weight: 700;
            font-family: inherit;
        }

        .slots input:focus {
            outline: none;
            border-color: #6366f1;
        }

        .btn-actions {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .btn {
            height: 50px;
            padding: 0 24px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 600;
            font-size: .9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: #6366f1;
            color: #fff;
        }

        .btn-primary:hover {
            background: #4f46e5;
        }

        .btn-primary:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        .btn-ghost {
            background: rgba(255, 255, 255, 0.06);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
        }

        /* Loader */
        .loader-overlay {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loader-overlay.active {
            display: block;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loader-overlay p {
            color: #94a3b8;
            font-size: .85rem;
        }

        /* Results */
        .results-section {
            display: none;
        }

        .results-section.active {
            display: block;
        }

        .total-time {
            text-align: center;
            margin-bottom: 20px;
            font-size: .85rem;
            color: #94a3b8;
        }

        .total-time strong {
            color: #f1f5f9;
        }

        .winner-banner {
            display: none;
            text-align: center;
            padding: 16px;
            background: rgba(250, 204, 21, .08);
            border: 1px solid rgba(250, 204, 21, .15);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .winner-banner.active {
            display: block;
        }

        .winner-banner h3 {
            color: #facc15;
            font-size: 1rem;
            margin-bottom: 2px;
        }

        .winner-banner p {
            color: #94a3b8;
            font-size: .8rem;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
        }

        .result-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            border-top: 3px solid #64748b;
        }

        .result-card.heur {
            border-top-color: #a78bfa;
        }

        .result-card.iter {
            border-top-color: #34d399;
        }

        .result-card.recur {
            border-top-color: #f472b6;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .card-header h3 {
            font-size: .95rem;
            font-weight: 600;
        }

        .tag {
            font-size: .65rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
            text-transform: uppercase;
        }

        .tag-ok {
            background: rgba(52, 211, 153, .15);
            color: #34d399;
        }

        .tag-fail {
            background: rgba(239, 68, 68, .15);
            color: #ef4444;
        }

        .tag-best {
            background: rgba(250, 204, 21, .15);
            color: #facc15;
        }

        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 14px;
        }

        .stat {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: .65rem;
            color: #94a3b8;
            margin-top: 2px;
            text-transform: uppercase;
        }

        .heur .stat-value {
            color: #a78bfa;
        }

        .iter .stat-value {
            color: #34d399;
        }

        .recur .stat-value {
            color: #f472b6;
        }

        .steps-title {
            font-size: .7rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 8px;
        }

        .steps-list {
            max-height: 240px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .steps-list::-webkit-scrollbar {
            width: 4px;
        }

        .steps-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, .1);
            border-radius: 2px;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: rgba(255, 255, 255, .03);
            border-radius: 6px;
            font-size: .8rem;
        }

        .step-item:last-child {
            background: rgba(52, 211, 153, .08);
            border: 1px solid rgba(52, 211, 153, .15);
        }

        .step-num {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .65rem;
            font-weight: 600;
            color: #94a3b8;
            flex-shrink: 0;
        }

        .step-item:last-child .step-num {
            background: rgba(52, 211, 153, .15);
            color: #34d399;
        }

        .step-state {
            font-family: monospace;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .error-msg {
            text-align: center;
            padding: 20px;
            color: #ef4444;
            font-size: .85rem;
        }

        @media (max-width: 700px) {
            .hero h1 {
                font-size: 1.4rem;
            }

            .puzzle-inputs {
                flex-direction: column;
                gap: 12px;
            }

            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="/" class="back-btn">← Volver al inicio</a>

        <div class="hero">
            <h1>Comparador Paralelo</h1>
            <p>Ejecuta 3 algoritmos al mismo tiempo y compara pasos y tiempos.</p>
            <div class="badge-row">
                <span class="badge badge-h">Heurístico</span>
                <span class="badge badge-i">Iterativo</span>
                <span class="badge badge-rc">Recursivo</span>
            </div>
        </div>

        <div class="input-panel">
            <h2>Configurar Puzzle</h2>
            <div class="puzzle-inputs">
                <div class="input-group">
                    <label>Estado Inicial</label>
                    <div class="slots">
                        <input type="number" min="1" max="9" value="4" id="i0">
                        <input type="number" min="1" max="9" value="2" id="i1">
                        <input type="number" min="1" max="9" value="3" id="i2">
                        <input type="number" min="1" max="9" value="1" id="i3">
                    </div>
                </div>
                <div class="input-group">
                    <label>Estado Meta</label>
                    <div class="slots">
                        <input type="number" min="1" max="9" value="1" id="m0">
                        <input type="number" min="1" max="9" value="2" id="m1">
                        <input type="number" min="1" max="9" value="3" id="m2">
                        <input type="number" min="1" max="9" value="4" id="m3">
                    </div>
                </div>
                <div class="btn-actions">
                    <button class="btn btn-primary" id="btnSolve" onclick="solvePuzzle()">🚀 Ejecutar</button>
                    <button class="btn btn-ghost" onclick="randomize()">🎲</button>
                </div>
            </div>
        </div>

        <div class="loader-overlay" id="loader">
            <div class="spinner"></div>
            <p>Ejecutando 3 algoritmos en paralelo…</p>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="winner-banner" id="winnerBanner">
                <h3>el mejor modelos es <span id="winnerName"></span></h3>
                <p id="winnerDesc"></p>
            </div>
            <div class="total-time">
                Tiempo total: <strong id="totalTime">—</strong>
            </div>
            <div class="results-grid" id="resultsGrid"></div>
        </div>
    </div>

    <script>
        function getInputValues() {
            return {
                estado: [0, 1, 2, 3].map(i => parseInt(document.getElementById('i' + i).value)),
                meta: [0, 1, 2, 3].map(i => parseInt(document.getElementById('m' + i).value))
            };
        }

        function randomize() {
            const arr = [1, 2, 3, 4];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            arr.forEach((v, k) => document.getElementById('i' + k).value = v);
        }

        function classForAlgo(name) {
            if (name.toLowerCase().includes('heur')) return 'heur';
            if (name.toLowerCase().includes('iter')) return 'iter';
            return 'recur';
        }

        function renderSteps(path) {
            if (!path || !path.length) return '<div class="error-msg">Sin pasos</div>';
            let html = '<div class="steps-title">Recorrido</div><div class="steps-list">';
            path.forEach((step, idx) => {
                html += `<div class="step-item">
                    <span class="step-num">${idx}</span>
                    <span class="step-state">[${step.join(', ')}]</span>
                </div>`;
            });
            return html + '</div>';
        }

        async function solvePuzzle() {
            const btn = document.getElementById('btnSolve');
            const loader = document.getElementById('loader');
            const results = document.getElementById('resultsSection');
            const grid = document.getElementById('resultsGrid');
            const banner = document.getElementById('winnerBanner');

            btn.disabled = true;
            results.classList.remove('active');
            banner.classList.remove('active');
            loader.classList.add('active');

            const { estado, meta } = getInputValues();

            try {
                const resp = await fetch('/api/solve_parallel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ estado_inicial: estado, solucion: meta })
                });
                const data = await resp.json();
                loader.classList.remove('active');

                if (!data.success) {
                    grid.innerHTML = `<div class="error-msg">${data.error}</div>`;
                    results.classList.add('active');
                    btn.disabled = false;
                    return;
                }

                document.getElementById('totalTime').textContent = data.total_time_ms + ' ms';

                const successful = data.results.filter(r => r.success);
                let best = null;
                if (successful.length) {
                    best = successful.reduce((a, b) => {
                        if (a.steps !== b.steps) return a.steps < b.steps ? a : b;
                        return a.time_ms < b.time_ms ? a : b;
                    });
                }

                const order = { heur: 0, iter: 1, recur: 2 };
                data.results.sort((a, b) => order[classForAlgo(a.name)] - order[classForAlgo(b.name)]);

                grid.innerHTML = '';
                data.results.forEach(r => {
                    const cls = classForAlgo(r.name);
                    const isBest = best && r.name === best.name;
                    const tag = r.success
                        ? (isBest ? '<span class="tag tag-best">🏆 Mejor</span>' : '<span class="tag tag-ok">✓ OK</span>')
                        : '<span class="tag tag-fail">✗ Fallo</span>';

                    const body = r.success
                        ? `<div class="stats-row">
                                <div class="stat"><div class="stat-value">${r.steps}</div><div class="stat-label">Pasos</div></div>
                                <div class="stat"><div class="stat-value">${r.time_ms}</div><div class="stat-label">ms</div></div>
                           </div>${renderSteps(r.path)}`
                        : `<div class="error-msg">❌ ${r.error}</div>`;

                    const card = document.createElement('div');
                    card.className = `result-card ${cls}`;
                    card.innerHTML = `<div class="card-header"><h3>${r.name}</h3>${tag}</div>${body}`;
                    grid.appendChild(card);
                });

                if (best) {
                    document.getElementById('winnerName').textContent = best.name;
                    document.getElementById('winnerDesc').textContent = `${best.steps} pasos en ${best.time_ms} ms`;
                    banner.classList.add('active');
                }
                results.classList.add('active');
            } catch (err) {
                loader.classList.remove('active');
                grid.innerHTML = `<div class="error-msg">Error: ${err.message}</div>`;
                results.classList.add('active');
            }
            btn.disabled = false;
        }
    </script>
</body>

</html>
