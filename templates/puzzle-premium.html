<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Lenguajes y Automatas - DFS</title>

    <!-- Link to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/puzzle-premium.css') }}">
</head>

<body>
    <div class="background-mesh"></div>
    <div class="dashboard-container">
        
        <div style="margin-bottom: 20px;">
            <a href="/" style="color: #64ffda; text-decoration: none; font-size: 0.9rem;">&larr; Volver al Hub Principal</a>
        </div>

        <header>
            <h1>Puzzle Lineal <span>DFS</span></h1>
            <p>Resuelve el puzzle paso a paso usando Búsqueda en Profundidad.</p>
        </header>

        <main class="glass-card">

            <section class="controls">
                <div class="input-group">
                    <label>Estado Inicial (Ej: 4,2,3,1)</label>
                    <input type="text" id="initial-state" value="4,2,3,1" placeholder="Ej: 4,2,3,1">
                </div>

                <div class="icon-arrow">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14" />
                        <path d="m12 5 7 7-7 7" />
                    </svg>
                </div>

                <div class="input-group">
                    <label>Solución Meta (Ej: 1,2,3,4)</label>
                    <input type="text" id="goal-state" value="1,2,3,4" placeholder="Ej: 1,2,3,4">
                </div>
            </section>

            <div class="action-bar" style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; width: 100%;">
                <button id="solve-btn" class="primary-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3" />
                    </svg>
                    Encontrar Solución
                </button>
                <button id="borrar-ruta-btn" class="secondary-btn" style="padding: 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s ease; font-size: 0.8rem;">
                    BORRAR RUTA
                </button>
                <button id="nueva-ruta-btn" class="secondary-btn" style="padding: 1rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s ease; font-size: 0.8rem;">
                    NUEVA RUTA
                </button>
            </div>

            <section class="results-viewer">
                <div class="results-header">
                    <h2>Ruta Encontrada <span id="step-count" class="badge">0 Pasos</span></h2>
                </div>
                <div id="alert-message" class="alert hidden"></div>
                <div id="path-container" class="path-container">
                    <!-- Steps will be dynamically injected here -->
                    <div class="placeholder-text">Presiona "Encontrar Solución" para comenzar...</div>
                </div>
            </section>
        </main>

        <footer>
            <p>Construido usando Búsqueda en Profundidad (DFS) integrado en Flask.</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/puzzle-premium.js') }}"></script>
</body>

</html>
