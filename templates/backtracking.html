<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backtracking Optimizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --secondary: #6366f1;
            --accent: #10b981;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.15) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .problem-statement {
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 16px;
            border-left: 4px solid var(--primary);
        }

        .problem-statement h3 {
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            color: #fbbf24;
        }

        .math-block {
            font-family: 'JetBrains Mono', monospace;
            margin: 10px 0;
            line-height: 1.8;
            color: #e2e8f0;
        }

        .btn-solve {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-solve:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
        }

        .btn-solve:active {
            transform: translateY(0);
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .result-grid.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-label {
            display: block;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            display: block;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text);
        }

        .stat-value.highlight {
            color: var(--accent);
        }

        .footer-nav {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .nav-link:hover {
            color: var(--text);
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 640px) {
            .result-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Backtracking Optimizer</h1>
            <p class="subtitle">Optimización de funciones lineales mediante búsqueda exhaustiva con poda.</p>
        </header>

        <main class="glass-card">
            <div class="problem-statement">
                <h3>Optimizador de Variables</h3>
                <p style="margin-bottom: 20px; color: var(--text-muted); font-size: 0.95rem;">
                    Introduce los límites máximos para las variables de decisión.
                </p>
            </div>

            <div class="range-inputs" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                <div class="input-group">
                    <label style="display: block; margin-bottom: 10px; color: var(--text-muted); font-weight: bold; font-size: 1.2rem;">Variable x₁</label>
                    <input type="number" id="maxX1" value="50" placeholder="Máximo x1" style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #3b82f6; padding: 15px; border-radius: 12px; font-size: 1.2rem; text-align: center; font-weight: bold;">
                </div>
                <div class="input-group">
                    <label style="display: block; margin-bottom: 10px; color: var(--text-muted); font-weight: bold; font-size: 1.2rem;">Variable x₂</label>
                    <input type="number" id="maxX2" value="50" placeholder="Máximo x2" style="width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #10b981; padding: 15px; border-radius: 12px; font-size: 1.2rem; text-align: center; font-weight: bold;">
                </div>
            </div>

            <button class="btn-solve" id="solveBtn">
                <div class="loader" id="loader"></div>
                <span id="btnText">Encontrar Solución Óptima</span>
            </button>

            <button class="btn-solve" id="clearBtn" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border); margin-top: -10px;">
                <span>Limpiar Resultados</span>
            </button>

            <div class="result-grid" id="resultGrid">
                <div class="stat-card">
                    <span class="stat-label">Valor Óptimo x₁</span>
                    <span class="stat-value highlight" id="valX1">-</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Valor Óptimo x₂</span>
                    <span class="stat-value highlight" id="valX2">-</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Beneficio Total (Z)</span>
                    <span class="stat-value" id="valZ" style="color: #fbbf24;">-</span>
                </div>
            </div>
        </main>

        <nav class="footer-nav">
            <a href="/" class="nav-link">← Volver al Dashboard</a>
        </nav>
    </div>

    <script>
        const solveBtn = document.getElementById('solveBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        const resultGrid = document.getElementById('resultGrid');
        const valX1 = document.getElementById('valX1');
        const valX2 = document.getElementById('valX2');
        const valZ = document.getElementById('valZ');

        const maxX1Input = document.getElementById('maxX1');
        const maxX2Input = document.getElementById('maxX2');

        clearBtn.addEventListener('click', () => {
            resultGrid.classList.remove('visible');
            btnText.textContent = 'Encontrar Solución Óptima';
            valX1.textContent = '-';
            valX2.textContent = '-';
            valZ.textContent = '-';
            maxX1Input.value = 50;
            maxX2Input.value = 50;
        });

        solveBtn.addEventListener('click', async () => {
            const rangos = [
                [0, parseInt(maxX1Input.value)],
                [0, parseInt(maxX2Input.value)]
            ];
            
            const beneficios = [6, 4];
            const limites = [150, 160];
            const coefs = [[7, 4], [6, 5]];

            if (isNaN(rangos[0][1]) || isNaN(rangos[1][1])) {
                alert("Por favor, completa los campos con números.");
                return;
            }

            solveBtn.disabled = true;
            loader.style.display = 'block';
            btnText.textContent = 'Calculando...';
            resultGrid.classList.remove('visible');

            try {
                const response = await fetch('/api/solve_backtracking', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        rangos: rangos,
                        beneficios: beneficios,
                        limites: limites,
                        coefs: coefs
                    })
                });
                const data = await response.json();

                if (data.success) {
                    await new Promise(r => setTimeout(r, 600));
                    valX1.textContent = data.x1;
                    valX2.textContent = data.x2;
                    valZ.textContent = '$' + data.z;
                    resultGrid.classList.add('visible');
                    btnText.textContent = '¡Optimización Completada!';
                } else {
                    alert('Atención: ' + data.error + (data.detalle ? '\n' + data.detalle : ''));
                    btnText.textContent = 'Ajustar y Reintentar';
                }
            } catch (err) {
                alert('Error de conexión');
                btnText.textContent = 'Error';
            } finally {
                solveBtn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
