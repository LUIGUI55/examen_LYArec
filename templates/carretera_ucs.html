<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carretera UCS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --accent: #6366f1;
        }

        body {
            background-color: var(--bg-color);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            gap: 20px;
        }

        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .node-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        select, input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        select:focus, input[type="text"]:focus, input[type="number"]:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        .btn-remove {
            background: rgba(255, 100, 100, 0.2);
            border: 1px solid rgba(255, 100, 100, 0.4);
            color: #ffb3b3;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .btn-remove:hover {
            background: rgba(255, 100, 100, 0.4);
        }

        .btn-solve {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #3b82f6, #6366f1);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }

        .btn-solve:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn-add-loc {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #10b981, #059669);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }

        .btn-add-loc:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-secondary {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #94a3b8;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.8rem;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .result-container {
            margin-top: 30px;
            padding: 20px;
            background: rgba(59, 130, 246, 0.1);
            border-left: 4px solid #3b82f6;
            border-radius: 4px;
        }

        .path-display {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
        }

        .city-tag {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
        }

        .arrow {
            color: #64748b;
        }

        .hidden {
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .alert-message {
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-top: 15px;
            text-align: center;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }
    </style>
</head>

<body>
    <!-- Main Route Card -->
    <div class="glass-container">
        <h1>Carretera (UCS)</h1>
        <p style="text-align: center; color: #94a3b8; margin-bottom: 20px; font-size: 0.9rem;">Uniform Cost Search - Ruta óptima secuencial con cálculo de costo total</p>

        <form id="ucsForm">
            <div id="nodesContainer">
                <div class="form-group" id="group-0">
                    <label>Ciudad Origen</label>
                    <select class="node-select" required>
                        <option value="" disabled selected>Selecciona origen...</option>
                        {% for city in cities %}
                        <option value="{{ city }}">{{ city }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group" id="group-1">
                    <label>Ciudad Destino 1</label>
                    <select class="node-select" required>
                        <option value="" disabled selected>Selecciona destino...</option>
                        {% for city in cities %}
                        <option value="{{ city }}">{{ city }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <button type="button" id="addNodeBtn" class="btn-secondary" style="width: 100%; margin-bottom: 10px;">+ Agregar Destino / Escala</button>

            <button type="submit" class="btn-solve">Buscar Ruta Óptima (UCS)</button>
        </form>

        <div class="btn-container">
            <button class="btn-secondary" id="borrarRutaBtn">BORRAR RUTA</button>
            <button class="btn-secondary" id="nuevaRutaBtn">NUEVA RUTA</button>
        </div>

        <div id="result" class="result-container hidden">
            <div id="costResult" style="font-weight: bold; margin-bottom: 10px; color: #60a5fa;">Costo Total: 0 km</div>
            <div id="pathResult" class="path-display"></div>
        </div>

        <div id="error" class="hidden alert-message alert-error"></div>

        <a href="/" class="back-link">← Volver al Dashboard</a>
    </div>

    <!-- Add Location Card -->
    <div class="glass-container">
        <h2 style="text-align: center; background: linear-gradient(to right, #34d399, #059669); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; font-size: 1.5rem; font-weight: 600;">Añadir Nueva Ubicación</h2>
        <p style="text-align: center; color: #94a3b8; margin-bottom: 20px; font-size: 0.9rem;">Inserta coordenadas reales y su conexión inicial</p>

        <form id="addLocationForm">
            <div class="form-group">
                <label>Nombre de la Ubicación</label>
                <input type="text" id="new-name" placeholder="Ej. TIJUANA" required>
            </div>

            <div class="form-group" style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>Latitud</label>
                    <input type="number" step="any" id="new-lat" placeholder="Ej. 32.5149" required>
                </div>
                <div style="flex: 1;">
                    <label>Longitud</label>
                    <input type="number" step="any" id="new-lon" placeholder="Ej. -115.4522" required>
                </div>
            </div>

            <div class="form-group">
                <label>Conectar a (Ubicación Existente)</label>
                <select id="new-connected" required>
                    <option value="" disabled selected>Selecciona ubicación...</option>
                    {% for city in cities %}
                    <option value="{{ city }}">{{ city }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Peso / Distancia de Conexión (Costo en km)</label>
                <input type="number" id="new-weight" placeholder="Ej. 450" required>
            </div>

            <button type="submit" class="btn-add-loc">Añadir Ubicación</button>
            <button type="button" id="randomLocationBtn" class="btn-secondary" style="width: 100%; margin-top: 10px; background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); color: #93c5fd;">Generar Ubicación Aleatoria</button>
        </form>

        <div id="add-message" class="hidden alert-message"></div>
    </div>

    <!-- Template para agregar escalas/destinos -->
    <template id="nodeTemplate">
        <div class="form-group nodo-agregado" style="animation: fadeUp 0.3s ease forwards;">
            <label class="node-label">Ciudad Destino X</label>
            <div class="node-row">
                <select class="node-select" required>
                    <option value="" disabled selected>Selecciona destino...</option>
                    {% for city in cities %}
                    <option value="{{ city }}">{{ city }}</option>
                    {% endfor %}
                </select>
                <button type="button" class="btn-remove" title="Eliminar este destino">&times;</button>
            </div>
        </div>
    </template>

    <script>
        let nodeCount = 1;
        let globalCities = [{% for city in cities %}"{{ city }}",{% endfor %}];

        document.getElementById('addNodeBtn').onclick = () => {
            nodeCount++;
            const container = document.getElementById('nodesContainer');
            const template = document.getElementById('nodeTemplate');
            const clone = template.content.cloneNode(true);

            const groupDiv = clone.querySelector('.form-group');
            groupDiv.id = `group-${nodeCount}`;

            const label = clone.querySelector('.node-label');
            label.textContent = `Ciudad Destino ${nodeCount}`;

            const removeBtn = clone.querySelector('.btn-remove');
            removeBtn.onclick = () => {
                groupDiv.remove();
                renumberNodes();
            };

            // Populate the new dropdown with the current globalCities list
            const select = clone.querySelector('.node-select');
            select.innerHTML = '<option value="" disabled selected>Selecciona destino...</option>';
            globalCities.forEach(city => {
                select.add(new Option(city, city));
            });

            container.appendChild(clone);
        };

        function renumberNodes() {
            const groups = document.querySelectorAll('.nodo-agregado');
            nodeCount = 1;
            groups.forEach((group) => {
                nodeCount++;
                group.id = `group-${nodeCount}`;
                group.querySelector('.node-label').textContent = `Ciudad Destino ${nodeCount}`;
            });
        }

        function updateAllDropdowns(cities) {
            globalCities = cities;
            const selects = document.querySelectorAll('.node-select');
            const connectSelect = document.getElementById('new-connected');
            
            const selectedValues = Array.from(selects).map(s => s.value);
            const connectValue = connectSelect.value;
            
            selects.forEach((select, idx) => {
                const prevVal = selectedValues[idx];
                select.innerHTML = '<option value="" disabled selected>Selecciona...</option>';
                cities.forEach(city => {
                    select.add(new Option(city, city));
                });
                if (prevVal && cities.includes(prevVal)) {
                    select.value = prevVal;
                }
            });
            
            connectSelect.innerHTML = '<option value="" disabled selected>Selecciona ubicación...</option>';
            cities.forEach(city => {
                connectSelect.add(new Option(city, city));
            });
            if (connectValue && cities.includes(connectValue)) {
                connectSelect.value = connectValue;
            }
        }

        document.getElementById('ucsForm').onsubmit = async (e) => {
            e.preventDefault();

            const selects = document.querySelectorAll('.node-select');
            const nodos = Array.from(selects).map(select => select.value);

            if (nodos.includes("")) {
                alert("Por favor selecciona todas las ciudades.");
                return;
            }

            const resDiv = document.getElementById('result');
            const errDiv = document.getElementById('error');
            const pathDiv = document.getElementById('pathResult');
            const costDiv = document.getElementById('costResult');

            resDiv.classList.add('hidden');
            errDiv.classList.add('hidden');
            pathDiv.innerHTML = '';

            try {
                const response = await fetch('/api/solve_carretera_ucs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nodos })
                });
                const data = await response.json();

                if (data.success) {
                    resDiv.classList.remove('hidden');
                    costDiv.textContent = `Costo Total: ${data.cost} km`;
                    data.path.forEach((city, i) => {
                        const tag = document.createElement('span');
                        tag.className = 'city-tag';
                        tag.textContent = city;
                        pathDiv.appendChild(tag);
                        if (i < data.path.length - 1) {
                            const arrow = document.createElement('span');
                            arrow.className = 'arrow';
                            arrow.innerHTML = '→';
                            pathDiv.appendChild(arrow);
                        }
                    });
                } else {
                    errDiv.innerText = data.error;
                    errDiv.classList.remove('hidden');
                }
            } catch (e) {
                errDiv.innerText = "Error de conexión";
                errDiv.classList.remove('hidden');
            }
        };

        // Event handler for Add Location Form
        document.getElementById('addLocationForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('new-name').value.trim();
            const lat = document.getElementById('new-lat').value;
            const lonVal = document.getElementById('new-lon').value;
            const connected_to = document.getElementById('new-connected').value;
            const weight = document.getElementById('new-weight').value;
            
            const msgDiv = document.getElementById('add-message');
            msgDiv.classList.add('hidden');
            msgDiv.className = 'alert-message';
            
            try {
                const response = await fetch('/api/add_location', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name,
                        lat,
                        lon: lonVal,
                        connected_to,
                        weight,
                        type: 'ucs'
                    })
                });
                const data = await response.json();
                
                if (data.success) {
                    msgDiv.textContent = `¡Ubicación ${name} agregada con éxito!`;
                    msgDiv.classList.add('alert-success');
                    msgDiv.classList.remove('hidden');
                    
                    // Clear inputs
                    document.getElementById('new-name').value = '';
                    document.getElementById('new-lat').value = '';
                    document.getElementById('new-lon').value = '';
                    document.getElementById('new-weight').value = '';
                    
                    // Update dropdowns dynamically
                    updateAllDropdowns(data.cities);
                } else {
                    msgDiv.textContent = data.error || 'Error al agregar la ubicación';
                    msgDiv.classList.add('alert-error');
                    msgDiv.classList.remove('hidden');
                }
            } catch (err) {
                msgDiv.textContent = 'Error de conexión con el servidor.';
                msgDiv.classList.add('alert-error');
                msgDiv.classList.remove('hidden');
            }
        };

        // Event handler for Random Location Button
        document.getElementById('randomLocationBtn').onclick = async () => {
            const msgDiv = document.getElementById('add-message');
            msgDiv.classList.add('hidden');
            msgDiv.className = 'alert-message';
            
            try {
                const response = await fetch('/api/add_random_location', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'ucs' })
                });
                const data = await response.json();
                
                if (data.success) {
                    msgDiv.innerHTML = `¡Ciudad <strong>${data.name}</strong> creada al azar!<br>` +
                                       `Coordenadas: ${data.lat}, ${data.lon}<br>` +
                                       `Conectada a: <strong>${data.connected_to}</strong> (${data.weight} km)`;
                    msgDiv.classList.add('alert-success');
                    msgDiv.classList.remove('hidden');
                    
                    // Update dropdowns
                    updateAllDropdowns(data.cities);
                } else {
                    msgDiv.textContent = data.error || 'Error al generar ubicación aleatoria';
                    msgDiv.classList.add('alert-error');
                    msgDiv.classList.remove('hidden');
                }
            } catch (err) {
                msgDiv.textContent = 'Error de conexión con el servidor.';
                msgDiv.classList.add('alert-error');
                msgDiv.classList.remove('hidden');
            }
        };

        document.getElementById('borrarRutaBtn').onclick = () => {
            document.getElementById('result').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
        };

        document.getElementById('nuevaRutaBtn').onclick = () => {
            document.querySelectorAll('.nodo-agregado').forEach(el => el.remove());
            document.querySelectorAll('.node-select').forEach(el => el.selectedIndex = 0);
            nodeCount = 1;
            document.getElementById('result').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
            document.getElementById('pathResult').innerHTML = '';
        };
    </script>
</body>

</html>
