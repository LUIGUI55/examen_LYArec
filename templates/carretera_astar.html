<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carretera A*</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --accent: #6366f1;
        }

        body {
            background-color: var(--bg-color);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .node-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        select {
            flex: 1;
            padding: 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .btn-remove {
            background: rgba(255, 100, 100, 0.2);
            border: 1px solid rgba(255, 100, 100, 0.4);
            color: #ffb3b3;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .btn-remove:hover {
            background: rgba(255, 100, 100, 0.4);
        }

        .btn-solve {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #3b82f6, #6366f1);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }

        .btn-solve:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-secondary {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #94a3b8;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.8rem;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .result-container {
            margin-top: 30px;
            padding: 20px;
            background: rgba(59, 130, 246, 0.1);
            border-left: 4px solid #3b82f6;
            border-radius: 4px;
        }

        .path-display {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
        }

        .city-tag {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
        }

        .arrow {
            color: #64748b;
        }

        .hidden {
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <div class="glass-container">
        <h1>Carretera (A*)</h1>
        <p style="text-align: center; color: #94a3b8; margin-bottom: 20px; font-size: 0.9rem;">Búsqueda A* - Ruta óptima secuencial con cálculo de costo total</p>

        <form id="astarForm">
            <div id="nodesContainer">
                <div class="form-group" id="group-0">
                    <label>Ciudad Origen</label>
                    <select class="node-select" required>
                        <option value="" disabled selected>Selecciona origen...</option>
                        {% for city in cities %}
                        <option value="{{ city }}">{{ city }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group" id="group-1">
                    <label>Ciudad Destino 1</label>
                    <select class="node-select" required>
                        <option value="" disabled selected>Selecciona destino...</option>
                        {% for city in cities %}
                        <option value="{{ city }}">{{ city }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <button type="button" id="addNodeBtn" class="btn-secondary" style="width: 100%; margin-bottom: 10px;">+ Agregar Destino / Escala</button>

            <button type="submit" class="btn-solve">Buscar Ruta Óptima (A*)</button>
        </form>

        <div class="btn-container">
            <button class="btn-secondary" id="borrarRutaBtn">BORRAR RUTA</button>
            <button class="btn-secondary" id="nuevaRutaBtn">NUEVA RUTA</button>
        </div>

        <div id="result" class="result-container hidden">
            <div id="costResult" style="font-weight: bold; margin-bottom: 10px; color: #60a5fa;">Costo Total: 0 km</div>
            <div id="pathResult" class="path-display"></div>
        </div>

        <div id="error" class="hidden" style="color: #ef4444; margin-top: 20px; text-align: center; font-size: 0.9rem;">
        </div>

        <a href="/" class="back-link">← Volver al Dashboard</a>
    </div>

    <!-- Template para agregar escalas/destinos -->
    <template id="nodeTemplate">
        <div class="form-group nodo-agregado" style="animation: fadeUp 0.3s ease forwards;">
            <label class="node-label">Ciudad Destino X</label>
            <div class="node-row">
                <select class="node-select" required>
                    <option value="" disabled selected>Selecciona destino...</option>
                    {% for city in cities %}
                    <option value="{{ city }}">{{ city }}</option>
                    {% endfor %}
                </select>
                <button type="button" class="btn-remove" title="Eliminar este destino">&times;</button>
            </div>
        </div>
    </template>

    <script>
        let nodeCount = 1;

        document.getElementById('addNodeBtn').onclick = () => {
            nodeCount++;
            const container = document.getElementById('nodesContainer');
            const template = document.getElementById('nodeTemplate');
            const clone = template.content.cloneNode(true);

            const groupDiv = clone.querySelector('.form-group');
            groupDiv.id = `group-${nodeCount}`;

            const label = clone.querySelector('.node-label');
            label.textContent = `Ciudad Destino ${nodeCount}`;

            const removeBtn = clone.querySelector('.btn-remove');
            removeBtn.onclick = () => {
                groupDiv.remove();
                renumberNodes();
            };

            container.appendChild(clone);
        };

        function renumberNodes() {
            const groups = document.querySelectorAll('.nodo-agregado');
            nodeCount = 1;
            groups.forEach((group) => {
                nodeCount++;
                group.id = `group-${nodeCount}`;
                group.querySelector('.node-label').textContent = `Ciudad Destino ${nodeCount}`;
            });
        }

        document.getElementById('astarForm').onsubmit = async (e) => {
            e.preventDefault();

            const selects = document.querySelectorAll('.node-select');
            const nodos = Array.from(selects).map(select => select.value);

            if (nodos.includes("")) {
                alert("Por favor selecciona todas las ciudades.");
                return;
            }

            const resDiv = document.getElementById('result');
            const errDiv = document.getElementById('error');
            const pathDiv = document.getElementById('pathResult');
            const costDiv = document.getElementById('costResult');

            resDiv.classList.add('hidden');
            errDiv.classList.add('hidden');
            pathDiv.innerHTML = '';

            try {
                const response = await fetch('/api/solve_carretera_astar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nodos })
                });
                const data = await response.json();

                if (data.success) {
                    resDiv.classList.remove('hidden');
                    costDiv.textContent = `Costo Total: ${data.cost} km`;
                    data.path.forEach((city, i) => {
                        const tag = document.createElement('span');
                        tag.className = 'city-tag';
                        tag.textContent = city;
                        pathDiv.appendChild(tag);
                        if (i < data.path.length - 1) {
                            const arrow = document.createElement('span');
                            arrow.className = 'arrow';
                            arrow.innerHTML = '→';
                            pathDiv.appendChild(arrow);
                        }
                    });
                } else {
                    errDiv.innerText = data.error;
                    errDiv.classList.remove('hidden');
                }
            } catch (e) {
                errDiv.innerText = "Error de conexión";
                errDiv.classList.remove('hidden');
            }
        };

        document.getElementById('borrarRutaBtn').onclick = () => {
            document.getElementById('result').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
        };

        document.getElementById('nuevaRutaBtn').onclick = () => {
            document.querySelectorAll('.nodo-agregado').forEach(el => el.remove());
            document.querySelectorAll('.node-select').forEach(el => el.selectedIndex = 0);
            nodeCount = 1;
            document.getElementById('result').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
            document.getElementById('pathResult').innerHTML = '';
        };
    </script>
</body>

</html>
